<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Receipt Scanner</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #000428, #004e92);
            color: white;
            margin: 0;
            padding: 0;
        }

        .container{
            width: 70%;
            margin: 30px auto;
            background: #1e2b45;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.4);
        }

        h1, h2{
            text-align: center;
            color: #ffffff;
        }

        form{
            margin-top: 20px;
        }

        input[type="file"]{
            margin-bottom: 20px;
            color: white;
        }

        button{
            width: 100%;
            padding: 12px;
            background: #3f7ae0;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background: #5b93f0;
        }

        .preview{
            margin-top: 30px;
            text-align: center;
        }

        .preview img{
            max-width: 70%;
            border-radius: 15px;
            border: 3px solid #4c6ea9;
        }

        .form-section{
            margin-top: 40px;
        }

        label{
            display: block;
            margin-top: 20px;
            margin-bottom: 8px;
            font-size: 18px;
        }

        input[type="text"]{
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #394b68;
            color: white;
            font-size: 16px;
        }

        textarea{
            width: 100%;
            height: 250px;
            margin-top: 15px;
            border-radius: 12px;
            border: none;
            padding: 15px;
            background: #061333;
            color: white;
            font-size: 16px;
            resize: none;
        }

        .footer{
            margin-top: 30px;
            text-align: center;
            color: #b5b5b5;
            font-size: 14px;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>AI Receipt Scanner & Form Autofill</h1>

    <form method="POST" enctype="multipart/form-data">

        <input type="file" name="receipt" required>

        <button type="submit">Upload Receipt</button>

    </form>

    {% if image_path %}

    <div class="preview">

        <h2>Uploaded Receipt</h2>

        <img src="{{ image_path }}" alt="Receipt Image">

    </div>

    {% endif %}

    <div class="form-section">

        <h2>Auto-Filled Form</h2>

        <label>Store Name</label>
        <input type="text" value="{{ store }}" readonly>

        <label>Date</label>
        <input type="text" value="{{ date }}" readonly>

        <label>Total Amount</label>
        <input type="text" value="{{ total }}" readonly>

        <label>Currency</label>
        <input type="text" value="{{ currency }}" readonly>

    </div>

    <div class="form-section">

        <h2>Extracted Text</h2>

        <textarea readonly>{{ extracted_text }}</textarea>

    </div>

    <div class="footer">

        Built using Python, Flask, OCR (Tesseract), and AI-powered text extraction.

    </div>

</div>

</body>
</html>
